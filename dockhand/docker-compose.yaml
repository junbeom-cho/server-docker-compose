# ==================================================
# Authentik 서버
# Avg CPU: 
# Avg Memory: 
# ==================================================
services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 10009:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://${PG_DOCKHAND_USER}:${PG_DOCKHAND_USER_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DOCKHAND_DATABASE}
    networks:
      - default
      - postgresql_default
# ==================================================
# 헬스체크 - 헬스체크 커맨드가 없음
# ==================================================
    healthcheck:
      disable: true
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=dockhand"

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: dockhand_default
  postgresql_default:
    external: true
