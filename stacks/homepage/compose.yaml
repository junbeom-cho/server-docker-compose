services:
  user_homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: user_homepage
    restart: unless-stopped
    ports:
      - 13000:3000
    volumes:
      - ./user_config:/app/config:rw
      - ./icons:/app/config/icons:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: Asia/Seoul
      PUID: 1000
      PGID: 988
      HOMEPAGE_ALLOWED_HOSTS: "*"
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - dockge_default
      - npm_default
  admin_homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: admin_homepage
    restart: unless-stopped
    ports:
      - 30000:3000
    volumes:
      - ./admin_config:/app/config:rw
      - ./icons:/app/config/icons:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: Asia/Seoul
      PUID: 1000
      PGID: 988
      HOMEPAGE_ALLOWED_HOSTS: "*"
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - dockge_default
      - npm_default
networks:
  dockge_default:
    external: true
  npm_default:
    external: true
