# ==================================================
# Rallly : 일정 투표/설문 서비스
# 평균 CPU : 0 ~ 0.5%
# 평균 메모리 : 300MB
# ==================================================

services:
  rallly:
    image: lukevella/rallly:latest
    container_name: rallly
    restart: unless-stopped
    ports:
      - 15004:3000
    environment:
      # PostgreSQL 연결 URL
      - DATABASE_URL=postgres://rallly_user:${PG_RALLLY_USER_PASSWORD}@postgresql:5432/rallly_db
      # 애플리케이션 시크릿 값
      - SECRET_PASSWORD=${RALLLY_SECRET}
      # 프론트엔드 공개 기본 URL
      - NEXT_PUBLIC_BASE_URL=https://rallly.junbeom.work
      # 사용자 문의 응답용 이메일 주소
      - SUPPORT_EMAIL=rallly@junbeom.work
      # 가입 허용 이메일 화이트리스트
      - ALLOWED_EMAILS=dev.junbeom@gmail.com
      # 인증 필수 여부
      - AUTH_REQUIRED=true
      # NextAuth 기준 URL
      - NEXTAUTH_URL=https://rallly.junbeom.work
      # 프록시 환경 Host 신뢰 여부
      - AUTH_TRUST_HOST=true
      # 신규 가입 허용 여부
      - REGISTRATION_ENABLED=false
      # SMTP 서버 주소
      - SMTP_HOST=smtp.resend.com
      # SMTP 포트
      - SMTP_PORT=587
      # SMTP SSL/TLS 강제 사용 여부
      - SMTP_SECURE=false
      # SMTP 인증서 검증 여부
      - SMTP_REJECT_UNAUTHORIZED=true
      # SMTP 사용자명
      - SMTP_USER=resend
      # SMTP 비밀번호(API 키)
      - SMTP_PWD=${RESEND_RALLLY_API_KEY}
      # 발신자 이메일 주소
      - NOREPLY_EMAIL=rallly@junbeom.work
      # 발신자 표시 이름
      - NOREPLY_EMAIL_NAME=Rallly
    networks:
      - default
      - postgresql-network
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:3000
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=rallly
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: rallly-network
  postgresql-network:
    external: true
