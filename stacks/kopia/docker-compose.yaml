# ==================================================
# Kopia : 백업/스냅샷 관리 서버
# ==================================================

services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    hostname: ${HOSTNAME:-KopiaServer}
    restart: unless-stopped
    ports:
      - 14000:51515
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=${KOPIA_ADMIN}
      - --server-password=${KOPIA_ADMIN_PASSWORD}
    volumes:
      - ./app/config:/app/config
      - ./app/cache:/app/cache
      - ./app/logs:/app/logs
      - /opt:/data/opt:ro
      - /tmp:/tmp:shared
    environment:
      # Kopia 저장소 암호
      - KOPIA_PASSWORD=${KOPIA_REPOSITORY_PASSWORD}
      # 컨테이너 내부 기본 사용자명
      - USER=junbeom-cho
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # rclone 설정 파일 경로
      - RCLONE_CONFIG=/app/config/rclone.conf
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test:
        - CMD-SHELL
        - wget --server-response --spider http://127.0.0.1:51515 2>&1 | grep -q "HTTP/"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=kopia"

# ==================================================
# 네트워크 설정
# ==================================================
networks: {}
