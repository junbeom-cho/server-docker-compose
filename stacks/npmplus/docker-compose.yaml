# ==================================================
# NPMplus : 리버스 프록시/SSL 관리 + CrowdSec
# ==================================================

services:
  npmplus:
    image: docker.io/zoeyvid/npmplus:latest
    container_name: npmplus
    restart: unless-stopped
    ports:
      - 80:80/tcp
      - 443:443/tcp
      - 443:443/udp
      - 10001:81/tcp
    volumes:
      - ./data:/data
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 내부 로그 로테이션 활성화 여부
      - LOGROTATE=true
      # 로그 보관 세대 수
      - LOGROTATIONS=7
      # IPv6 비활성화 여부
      - DISABLE_IPV6=true
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=npmplus"
    networks:
      - npm_default

  crowdsec:
    image: docker.io/crowdsecurity/crowdsec:latest
    container_name: npmplus_crowdsec
    restart: unless-stopped
    ports:
      - 11003:8080
    volumes:
      - ./crowdsec/conf:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      - ./data/logs:/var/log/npmplus:ro
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 로드할 CrowdSec 컬렉션 목록
      - COLLECTIONS=crowdsecurity/nginx-proxy-manager
      # 로그 파일 접근 그룹 GID
      - GID=1000
    depends_on:
      - npmplus
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD-SHELL", "pgrep crowdsec >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=npmplus-crowdsec"
    networks:
      - npm_default

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    name: npm_default
    external: true
    driver: bridge
