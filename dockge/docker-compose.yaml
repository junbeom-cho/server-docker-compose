# ==================================================
# Dockge : Docker Compose 스택 관리 웹 UI
# 평균 CPU : 1 ~ 5%
# 평균 메모리 : 150MB
# ==================================================

services:
  dockge:
    image: louislam/dockge:1.5.0
    container_name: dockge
    restart: unless-stopped
    ports:
      - 10000:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      # Dockge가 감시하고 관리할 스택 디렉터리 경로
      - DOCKGE_STACKS_DIR=/opt/stacks
    networks:
      - npm_default
# ==================================================
# 헬스체크 - 헬스체크 커맨드가 없음
# ==================================================
  healthcheck:
    disable: true
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=dockge"
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
