# ==================================================
# Scrutiny : 디스크 S.M.A.R.T/NVMe 상태 모니터링
# 평균 CPU : 0 ~ 0.5%
# 평균 메모리 : 100MB
# ==================================================

services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    privileged: true
    restart: unless-stopped
    ports:
      - 12002:8080
    volumes:
      - /run/udev:/run/udev:ro
      - /opt/data/scrutiny/config:/opt/scrutiny/config
      - /opt/data/scrutiny/influxdb:/opt/scrutiny/influxdb
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /dev:/dev:ro
    environment:
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # SMART 수집기가 전송할 Scrutiny API 엔드포인트
      - SCRUTINY_COLLECTOR_API_ENDPOINT=http://localhost:8080
    # NVMe/SMART 정보 수집을 위한 권한 설정
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      # 실제 드라이브인 nvme0n1 매핑
      - /dev/nvme0n1:/dev/nvme0n1
      # NVMe 컨트롤러 장치 접근
      - /dev/nvme0:/dev/nvme0
    networks:
      - default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8080/api/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=scrutiny
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: scrutiny-network
