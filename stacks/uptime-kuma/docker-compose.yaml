# ==================================================
# Uptime Kuma : 서비스 상태 모니터링 대시보드
# ==================================================

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 10004:3001
    volumes:
      - ./data:/app/data:rw
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 생성 파일 기본 권한 마스크
      - UMASK=0022
      # Node.js 실행 모드 (프로덕션 최적화)
      - NODE_ENV=production
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test:
        - CMD-SHELL
        - node
        - test/health-check.js
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=uptime-kuma"
    networks:
      - npm_default
      - postgresql_default
      - dockge_default
      - kopia_default

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
  postgresql_default:
    external: true
  dockge_default:
    external: true
  kopia_default:
    external: true
