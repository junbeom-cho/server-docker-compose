# ==================================================
# Socket-Proxy : Docker API 프록시
# 평균 CPU : 0.5 ~ 2%
# 평균 메모리 : 50MB
# ==================================================

services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: socket-proxy
    environment:
      CONTAINERS: 1
      EVENTS: 1
      IMAGES: 1
      INFO: 1
      LOG_LEVEL: warning
      PING: 1
      NETWORKS: 1
      POST: 1
      TZ: Asia/Seoul
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /run
    networks:
      - tugtainer-default
    labels:
      dev.quenary.tugtainer.protected: "true"
  app:
    depends_on:
      - socket-proxy
    container_name: tugtainer
    image: ghcr.io/quenary/tugtainer:1
    volumes:
      - ./tugtainer_data:/tugtainer
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
    networks:
      - tugtainer-default
    ports:
      - 10008:80
    labels:
      dev.quenary.tugtainer.protected: true
networks:
  tugtainer-default: {}
