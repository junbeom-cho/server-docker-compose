# ==================================================
# Syncthing : 파일 동기화 서비스
# ==================================================

services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:2.0.15
    container_name: syncthing
    restart: unless-stopped
    ports:
      - 13006:8384
      - 13007:22000/tcp
      - 13007:22000/udp
      - 13008:21027/udp
    volumes:
      - ./config:/config
      - ./data1:/data1
      - ./data2:/data2
      - /home/junbeom/obsidian-vault:/obsidian-vault
    environment:
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: curl -fkLsS -m 2 127.0.0.1:8384/rest/noauth/health | grep -o --color=never OK || exit 1
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=syncthing"

# ==================================================
# 네트워크 설정
# ==================================================
networks: {}
