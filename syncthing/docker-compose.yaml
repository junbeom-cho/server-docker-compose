# ==================================================
# Syncthing : 파일 동기화 서비스
# Avg CPU: 0 ~ 0.5%
# Avg Memory: 100MB
# ==================================================

services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:2.0.15
    container_name: syncthing
    restart: unless-stopped
    ports:
      - 13002:8384
      - 13003:22000/tcp
      - 13003:22000/udp
      - 13004:21027/udp
    volumes:
      - /opt/data/syncthing:/config
      - /home/junbeom/obsidian-vault:/obsidian-vault
    environment:
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
    networks:
      - default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test: curl -fkLsS -m 2 127.0.0.1:8384/rest/noauth/health | grep -o --color=never
        OK || exit 1
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=syncthing
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: syncthing-network
