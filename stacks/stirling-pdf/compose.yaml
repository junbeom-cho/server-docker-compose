services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - 13001:8080
    volumes:
      - ./data/tessdata:/usr/share/tessdata:rw
      - ./data/configs:/configs:rw
      - ./data/logs:/logs:rw
      - ./data/pipeline:/pipeline:rw
    environment:
      # Security & Authentication
      SECURITY_ENABLELOGIN: false
      # Localization
      SYSTEM_DEFAULTLOCALE: ko-KR
      LANGS: ko_KR,en_GB,zh_TW
      # Features
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: false
      # System Configuration
      DOCKER_ENABLE_SECURITY: false
      SYSTEM_ROOTURIPATH: /
      SYSTEM_CUSTOMSTATICFILEPATH: /customFiles/
    healthcheck:
      test:
        - CMD
        - curl
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:8080/api/v1/info/status
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - npm_default
networks:
  npm_default:
    external: true
