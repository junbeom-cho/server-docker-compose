# ==================================================
# Paperless-ngx : 문서 OCR/아카이빙 플랫폼
# ==================================================

services:
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-webserver
    restart: unless-stopped
    depends_on:
      - broker
      - gotenberg
      - tika
    ports:
      - 13003:8000
    volumes:
      - /opt/stacks/paperless-ngx/data/data:/usr/src/paperless/data
      - /opt/stacks/paperless-ngx/data/media:/usr/src/paperless/media
      - /opt/stacks/paperless-ngx/data/export:/usr/src/paperless/export
      - /opt/stacks/paperless-ngx/data/consume:/usr/src/paperless/consume
    environment:
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 외부 접근 기준 URL
      - PAPERLESS_URL=https://paperless.junbeom.work
      # 허용할 Host 헤더 목록
      - PAPERLESS_ALLOWED_HOSTS=*
      # CORS 허용 출처
      - PAPERLESS_CORS_ALLOWED_HOSTS=https://paperless.junbeom.work
      # PostgreSQL 호스트명
      - PAPERLESS_DBHOST=postgresql
      # PostgreSQL 포트
      - PAPERLESS_DBPORT=5432
      # PostgreSQL 데이터베이스 이름
      - PAPERLESS_DBNAME=${PG_PAPERLESS_DATABASE}
      # PostgreSQL 사용자명
      - PAPERLESS_DBUSER=${PG_PAPERLESS_USER}
      # PostgreSQL 비밀번호
      - PAPERLESS_DBPASS=${PG_PAPERLESS_USER_PASSWORD}
      # Redis 연결 URL
      - PAPERLESS_REDIS=redis://broker:6379
      # OCR 지원 언어 목록
      - PAPERLESS_OCR_LANGUAGES=kor eng
      # 기본 OCR 언어
      - PAPERLESS_OCR_LANGUAGE=kor
      # Tika/Gotenberg 연동 활성화 여부
      - PAPERLESS_TIKA_ENABLED=1
      # Gotenberg API 엔드포인트
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://gotenberg:3000
      # Apache Tika API 엔드포인트
      - PAPERLESS_TIKA_ENDPOINT=http://tika:9998
      # 역방향 프록시 헤더 기반 사용자 인증 활성화
      - PAPERLESS_ENABLE_HTTP_REMOTE_USER=true
      # 인증 사용자명을 전달받을 HTTP 헤더명
      - PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME=HTTP_X_AUTHENTIK_USERNAME
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=paperless-webserver"
    networks:
      - npm_default
      - postgresql_default
      - paperless_default

  broker:
    image: docker.io/library/redis:7
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - /opt/stacks/paperless-ngx/data/redis:/data
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=paperless-redis"
    networks:
      - paperless_default

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=paperless-gotenberg"
    networks:
      - paperless_default

  tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9998"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=paperless-tika"
    networks:
      - paperless_default

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  paperless_default:
    name: paperless_default
    driver: bridge
  npm_default:
    external: true
  postgresql_default:
    external: true
