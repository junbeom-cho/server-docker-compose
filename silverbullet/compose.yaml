services:
  silverbullet:
    image: ghcr.io/silverbulletmd/silverbullet:latest
    container_name: silverbullet
    restart: unless-stopped
    environment:
      - SB_USER=${USER_NAME}:${USER_PASSWORD}
    volumes:
      - /home/junbeom/obsidian-vault:/space/obsidian-vault
    ports:
      - 14005:3000
networks:
  default:
    name: silverbullet-network
