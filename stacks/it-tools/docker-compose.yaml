# ==================================================
# IT-Tools : 개발/운영용 웹 유틸리티 모음
# Avg CPU: 0.5 ~ 1%
# Avg Memory: 100MB
# ==================================================

services:
  it-tools:
    image: ghcr.io/sharevb/it-tools:latest
    container_name: it-tools
    pull_policy: always
    restart: unless-stopped
    ports:
      - 12001:8080
    environment:
      - TZ=Asia/Seoul
      - NODE_ENV=production
    networks:
      - npm_default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:8080
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=it-tools
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
