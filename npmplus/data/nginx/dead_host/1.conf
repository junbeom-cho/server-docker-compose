# ----------------------------------------------------------------------
# *.junbeom.work
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# ----------------------------------------------------------------------


server {
    server_name *.junbeom.work;


    listen 0.0.0.0:80;
    listen [::]:80;


    location /.well-known/acme-challenge/ {
        root /data/tls/certbot/acme-challenge;
        fancyindex off;
        index off;
        allow all;
        auth_basic off;
        auth_request off;
    }


    location / {
        return 404;
    }
    error_page 404 /dead.html;
    location = /dead.html {
        root /usr/local/nginx/html;
        internal;
    }


    # Custom
    include /data/custom_nginx/server_dead.conf;
}

