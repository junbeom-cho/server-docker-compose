# ==================================================
# Dozzle : Docker 컨테이너 로그 실시간 뷰어
# Avg CPU: 0.5 ~ 2%
# Avg Memory: 100MB
# ==================================================

services:
  dozzle:
    image: ghcr.io/amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - 10005:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    environment:
      - TZ=Asia/Seoul
    networks:
      - npm_default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=dozzle
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
