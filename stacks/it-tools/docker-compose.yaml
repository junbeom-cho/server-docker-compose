# ==================================================
# IT-Tools : 개발/운영용 웹 유틸리티 모음
# ==================================================

services:
  it-tools:
    image: ghcr.io/sharevb/it-tools:nightly
    container_name: it-tools
    pull_policy: always
    restart: unless-stopped
    ports:
      - 12001:8080
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # Node.js 실행 모드 (프로덕션 최적화)
      - NODE_ENV=production
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    security_opt:
      - no-new-privileges:true
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=it-tools"
    networks:
      - npm_default

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
