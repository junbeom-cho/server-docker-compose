services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 10004:3001
    volumes:
      - ./data:/app/data:rw
    environment:
      # Localization
      - TZ=Asia/Seoul
      - UMASK=0022
      # Performance
      - NODE_ENV=production
    healthcheck:
      test:
        - CMD-SHELL
        - node
        - test/health-check.js
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - npm_default
      - postgresql_default
      - dockge_default
      - kopia_default
networks:
  npm_default:
    external: true
  postgresql_default:
    external: true
  dockge_default:
    external: true
  kopia_default:
    external: true
