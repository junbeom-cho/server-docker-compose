# ==================================================
# Paperless-ngx : 문서 OCR/아카이빙 플랫폼
# ==================================================

services:
  # ==================================================
  # Paperless-ngx 웹서버
  # 평균 CPU : 0 ~ 1%
  # 평균 메모리 : 500MB ~ 1GB
  # ==================================================
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-webserver
    restart: unless-stopped
    depends_on:
      - broker
      - gotenberg
      - tika
    ports:
      - 13007:8000
    volumes:
      - /opt/data/paperless-ngx/data/data:/usr/src/paperless/data
      - /opt/data/paperless-ngx/data/media:/usr/src/paperless/media
      - /opt/data/paperless-ngx/data/export:/usr/src/paperless/export
      - /opt/data/paperless-ngx/data/consume:/usr/src/paperless/consume
    environment:
      # 컨테이너 프로세스 실행 사용자 UID
      - USERMAP_UID=1000
      # 컨테이너 프로세스 실행 그룹 GID
      - USERMAP_GID=1000
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 외부 접근 기준 URL
      - PAPERLESS_URL=https://paperless.junbeom.work
      # 허용할 Host 헤더 목록
      - PAPERLESS_ALLOWED_HOSTS=*
      # CORS 허용 출처
      - PAPERLESS_CORS_ALLOWED_HOSTS=https://paperless.junbeom.work
      # PostgreSQL 호스트명
      - PAPERLESS_DBHOST=postgresql
      # PostgreSQL 포트
      - PAPERLESS_DBPORT=5432
      # PostgreSQL 데이터베이스 이름
      - PAPERLESS_DBNAME=${PG_PAPERLESS_DATABASE}
      # PostgreSQL 사용자명
      - PAPERLESS_DBUSER=${PG_PAPERLESS_USER}
      # PostgreSQL 비밀번호
      - PAPERLESS_DBPASS=${PG_PAPERLESS_USER_PASSWORD}
      # Redis 연결 URL
      - PAPERLESS_REDIS=redis://broker:6379
      # OCR 지원 언어 목록
      - PAPERLESS_OCR_LANGUAGES=kor eng
      # 기본 OCR 언어
      - PAPERLESS_OCR_LANGUAGE=kor
      # Tika/Gotenberg 연동 활성화 여부
      - PAPERLESS_TIKA_ENABLED=1
      # Gotenberg API 엔드포인트
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://gotenberg:3000
      # Apache Tika API 엔드포인트
      - PAPERLESS_TIKA_ENDPOINT=http://tika:9998
      # 역방향 프록시 헤더 기반 사용자 인증 활성화
      - PAPERLESS_ENABLE_HTTP_REMOTE_USER=true
      # 인증 사용자명을 전달받을 HTTP 헤더명
      - PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME=HTTP_X_AUTHENTIK_USERNAME
      # Tugtainer 보호 라벨 설정
    labels:
      dev.quenary.tugtainer.protected: "true"
    networks:
      - default
      - postgresql-network
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      disable: true
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=paperless-webserver
  # ==================================================
  # Paperless-ngx redis
  # 평균 CPU : 0 ~ 0.5%
  # 평균 메모리 : 10MB
  broker:
    image: docker.io/library/redis:7
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - /opt/data/paperless-ngx/redis:/data
      # Tugtainer 보호 라벨 설정
    labels:
      dev.quenary.tugtainer.protected: "true"
    networks:
      - default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=paperless-redis
  # ==================================================
  # Gotenberg : PDF 변환 서비스
  # 평균 CPU : 0 ~ 0.5%
  # 평균 메모리 : 10MB
  # ==================================================
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    # Tugtainer 보호 라벨 설정
    labels:
      dev.quenary.tugtainer.protected: "true"
    networks:
      - default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:3000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=paperless-gotenberg
  # ==================================================
  # Apache Tika : 문서 텍스트 추출 서비스
  # 평균 CPU : 0 ~ 0.5%
  # 평균 메모리 : 400MB
  # ==================================================
  tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped
    # Tugtainer 보호 라벨 설정
    labels:
      dev.quenary.tugtainer.protected: "true"
    networks:
      - default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      disable: true
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=paperless-tika
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: paperless-network
  postgresql-network:
    external: true
