# ==================================================
# Rallly : 일정 투표/설문 서비스
# 평균 CPU : 0 ~ 0.5%
# 평균 메모리 : 300MB
# ==================================================

services:
  rallly:
    image: lukevella/rallly:latest
    container_name: rallly
    restart: unless-stopped
    ports:
      - 15004:3000
    environment:
      # General
      - NEXT_PUBLIC_BASE_URL=https://rallly.junbeom.work
      - SECRET_PASSWORD=${RALLLY_SECRET}
      - SUPPORT_EMAIL=rallly@junbeom.work
      - NOREPLY_EMAIL=rallly@junbeom.work
      - NOREPLY_EMAIL_NAME=Rallly
      - INITIAL_ADMIN_EMAIL=dev.junbeom@gmail.com
      # Datbase
      - DATABASE_URL=postgres://rallly_user:${PG_RALLLY_USER_PASSWORD}@postgresql:5432/rallly_db
      # SMTP
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=resend
      - SMTP_PWD=${RESEND_RALLLY_API_KEY}
      - SMTP_REJECT_UNAUTHORIZED=true
      # Auth
      - EMAIL_LOGIN_ENABLED=true
      - REGISTRATION_ENABLED=true
      - ALLOWED_EMAILS=dev.junbeom@gmail.com
      - NEXTAUTH_URL=https://rallly.junbeom.work
      - AUTH_TRUST_HOST=true
    networks:
      - default
      - postgresql-network
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:3000
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=rallly
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: rallly-network
  postgresql-network:
    external: true
