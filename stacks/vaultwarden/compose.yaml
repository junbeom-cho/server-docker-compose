lservices:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      # Core Settings
      DOMAIN: https://${VAULT_DOMAIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      # SSO Configuration
      SSO_ENABLED: true
      SSO_AUTHORITY: https://${AUTHENTIK_DOMAIN}/application/o/${VAULT_SLUGS}/
      SSO_CLIENT_ID: ${VAULT_CLIENT_ID}
      SSO_CLIENT_SECRET: ${VAULT_CLIENT_SECRET}
      SSO_SCOPES: openid email profile offline_access
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: false
      SSO_CLIENT_CACHE_EXPIRATION: 0
      SSO_ONLY: true
      SSO_SIGNUPS_MATCH_EMAIL: false
      # Security Settings
      SIGNUPS_ALLOWED: true
      INVITATIONS_ALLOWED: true
      SHOW_PASSWORD_HINT: false
      # Performance & Limits
      WEB_VAULT_ENABLED: true
      WEBSOCKET_ENABLED: true
      ROCKET_WORKERS: 10
    volumes:
      - ./vw-data/:/data/:rw
    ports:
      - 11002:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: false
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - npm_default
networks:
  npm_default:
    external: true
