# ==================================================
# Obsidian Blog : 정적 웹사이트 호스팅
# 평균 CPU : 0 ~ 0.1%
# 평균 메모리 : 50MB
# ==================================================

services:
  obsidian-blog:
    image: nginx:alpine
    container_name: obsidian-blog
    restart: unless-stopped
    ports:
      - 14004:80
    volumes:
      - /home/junbeom/quartz-blog:/usr/share/nginx/html:ro
      - /home/junbeom/quartz-blog/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
    # ==================================================
    # 헬스체크 - 헬스체크 없음
    # ==================================================
    healthcheck:
      test: curl -f http:/localhost:80 || exit 1
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=obsidian-blog
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: obsidian-blog-network
