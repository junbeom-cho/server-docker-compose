services:
  app:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - 80:80 # Public HTTP
      - 443:443 # Public HTTPS
      - 81:81 # Admin Web UI
    environment:
      TZ: Asia/Seoul
      DB_MYSQL_HOST: db
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: npm
      DB_MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
      DB_MYSQL_NAME: npm
    volumes:
      # 아까 만든 폴더와 연결
      - /opt/docker/npm/data:/data
      - /opt/docker/npm/letsencrypt:/etc/letsencrypt
    healthcheck:
      # 프로그램이 잘 살아있는지 10초마다 확인
      test:
        - CMD
        - /bin/check-health
      interval: 10s
      timeout: 3s
    depends_on:
      - db
  db:
    image: jc21/mariadb-aria:latest
    restart: unless-stopped
    -ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: npm
      MYSQL_USER: npm
      MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - /opt/docker/npm/mysql:/var/lib/mysql
networks: {}
