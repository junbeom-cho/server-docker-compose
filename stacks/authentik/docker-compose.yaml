# ==================================================
# Authentik : SSO/IDP 인증 서버
# ==================================================

services:
  server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.12.1}
    container_name: authentik_server
    command: server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 11000:9000
      - 11001:9443
    volumes:
      - ./data:/data
      - ./custom-templates:/templates
    environment:
      # Authentik이 연결할 PostgreSQL 호스트명
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      # Authentik 데이터베이스 이름
      - AUTHENTIK_POSTGRESQL__NAME=${PG_AUTHENTIK_DATABASE}
      # Authentik 데이터베이스 비밀번호
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_AUTHENTIK_PASSWORD}
      # Authentik 데이터베이스 사용자명
      - AUTHENTIK_POSTGRESQL__USER=${PG_AUTHENTIK_USER}
      # 세션/암호화용 시크릿 키
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/-/health/live/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=authentik-server"
    networks:
      - npm_default
      - postgresql_default
      - default

  worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.12.1}
    container_name: authentik_worker
    command: worker
    restart: unless-stopped
    user: root
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./certs:/certs
      - ./custom-templates:/templates
    environment:
      # Authentik이 연결할 PostgreSQL 호스트명
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      # Authentik 데이터베이스 이름
      - AUTHENTIK_POSTGRESQL__NAME=${PG_AUTHENTIK_DATABASE}
      # Authentik 데이터베이스 비밀번호
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_AUTHENTIK_PASSWORD}
      # Authentik 데이터베이스 사용자명
      - AUTHENTIK_POSTGRESQL__USER=${PG_AUTHENTIK_USER}
      # 세션/암호화용 시크릿 키
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=authentik-worker"
    networks:
      - npm_default
      - postgresql_default
      - default

  redis:
    image: redis:alpine
    container_name: authentik_redis
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
# ==================================================
# 헬스체크
# ==================================================
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      start_period: 20s
      interval: 30s
      timeout: 10s
      retries: 5
# ==================================================
# 리소스 제한 - 필요시 조정
# ==================================================
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
# ==================================================
# 로그 설정
# ==================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=authentik-redis"
    networks:
      - default

volumes:
  database:
    driver: local

# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    driver: bridge
  npm_default:
    external: true
  postgresql_default:
    external: true
