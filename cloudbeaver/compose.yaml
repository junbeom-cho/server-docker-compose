services:
  cloudbeaver:
    image: "dbeaver/cloudbeaver:latest"
    restart: unless-stopped
    volumes:
      - ./data:/opt/cloudbeaver/workspace
      - ../dockge/data/:/opt/cloudbeaver/workspace/sqlite/dockge:ro
    ports:
      - 8978:8978
    networks:
      - postgresql_default
      - npm_default

networks:
  postgresql_default:
    external: true
  npm_default:
    external: true
