<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <style>
      /* 기본 스타일 리셋 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 2rem;
      }

      /* 404 강조 숫자 */
      .error-code {
        font-size: 8rem;
        font-weight: 900;
        line-height: 1;
        color: #e2e8f0;
        margin-bottom: 1rem;
        position: relative;
      }

      .error-code::after {
        content: "404";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: #3b82f6;
        font-size: 4rem;
      }

      h1 {
        font-size: 1.875rem;
        font-weight: 700;
        margin-bottom: 1rem;
        letter-spacing: -0.025em;
      }

      p {
        font-size: 1.125rem;
        color: #64748b;
        margin-bottom: 2.5rem;
        line-height: 1.6;
      }

      /* 홈으로 이동 버튼 */
      .home-button {
        display: inline-block;
        background-color: #3b82f6;
        color: white;
        padding: 0.875rem 1.75rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.2s;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
      }

      .home-button:hover {
        background-color: #2563eb;
      }

      /* 보안을 위해 하단 서버 정보(Nginx 등)는 의도적으로 삭제함 */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>
        요청하신 주소가 정확한지 다시 한번 확인해 주세요.<br />
        서브도메인이 오타일 수도 있습니다.
      </p>

      <!-- <a href="https://" class="home-button">메인으로 돌아가기</a> -->
    </div>
  </body>
</html>
