services:
  postgresql:
    image: postgres:17
    container_name: postgresql
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${PG_ROOT_PASSWORD}
      TZ: Asia/Seoul
      LANG: en_US.utf8
    volumes:
      - ./data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped
networks:
  postgresql_defualt:
    external: false
