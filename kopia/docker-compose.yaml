# ==================================================
# Kopia : 백업/스냅샷 관리 서버
# Avg CPU: 0 ~ 1%
# Avg Memory: 300MB
# ==================================================

services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    hostname: ${HOSTNAME:-KopiaServer}
    restart: unless-stopped
    ports:
      - 12003:51515
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=${KOPIA_ADMIN}
      - --server-password=${KOPIA_ADMIN_PASSWORD}
    volumes:
      - /opt/data/kopia/config:/app/config
      - /opt/data/kopia/cache:/app/cache
      - /opt/data/kopia/logs:/app/logs
      - /opt:/data/opt:ro
      - /tmp:/tmp:shared
    environment:
      # Kopia 저장소 암호
      - KOPIA_PASSWORD=${KOPIA_REPOSITORY_PASSWORD}
      # 컨테이너 내부 기본 사용자명
      - USER=junbeom-cho
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # rclone 설정 파일 경로
      - RCLONE_CONFIG=/app/config/rclone.conf
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    # Tugtainer 보호 라벨 설정
    labels:
      dev.quenary.tugtainer.protected: "true"
    networks:
      - default
    # ==================================================
    # 헬스체크 - 헬스체크 없음
    # ==================================================
    healthcheck:
      disable: true
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=kopia
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  default:
    name: kopia-network
