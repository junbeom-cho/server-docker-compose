# ==================================================
# File Browser : 웹 기반 파일 탐색기
# Avg CPU : 0 ~ 1%
# Avg Memory : 20MB
# ==================================================

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - 13005:80
    volumes:
      - ./data/database:/database
      - ./data/config:/config
      - ./srv:/srv
    environment:
      # 컨테이너 프로세스 실행 그룹 GID
      - PGID=1000
      # 컨테이너 프로세스 실행 사용자 UID
      - PUID=1000
    networks:
      - npm_default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:80
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=filebrowser
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  npm_default:
    external: true
