services:
  # --------------------------------------------------------------------------------
  # 1. NPMplus (Web Server & Proxy)
  # --------------------------------------------------------------------------------
  npmplus:
    container_name: npmplus
    image: docker.io/zoeyvid/npmplus:latest
    restart: unless-stopped
    ports:
      - 80:80/tcp # HTTP
      - 443:443/tcp # HTTPS
      - 443:443/udp # HTTP/3 (QUIC)
      - 81:81/tcp # Admin UI
    networks:
      - npm_default
    environment:
      - TZ=Asia/Seoul
      - PUID=1000 # Linux 사용자 ID
      - PGID=1000 # Linux 그룹 ID
      # [CrowdSec 연동 필수] 로그가 계속 쌓이도록 로테이션 활성화
      - LOGROTATE=true
      - LOGROTATIONS=7
      # [최적화] IPv6 미사용 시 비활성화 (오류 방지)
      - DISABLE_IPV6=true
    volumes:
      - ./data:/data # 설정 및 로그 저장소
  # --------------------------------------------------------------------------------
  # 2. CrowdSec (IPS - 보안)
  # --------------------------------------------------------------------------------
  crowdsec:
    container_name: npmplus_crowdsec
    image: docker.io/crowdsecurity/crowdsec:latest
    restart: unless-stopped
    ports:
      - 8082:8080
    networks:
      - npm_default
    environment:
      - TZ=Asia/Seoul
      # NPMplus 로그 분석을 위한 컬렉션 자동 설치
      - COLLECTIONS=crowdsecurity/nginx-proxy-manager
      - GID=1000
    volumes:
      - ./crowdsec/conf:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      # [핵심] NPMplus가 호스트 ./data/logs에 남긴 로그를 읽기 전용으로 마운트
      - ./data/logs:/var/log/npmplus:ro
    depends_on:
      - npmplus
networks:
  npm_default:
    name: npm_default
    external: true
    driver: bridge
