# ==================================================
# Shlink : URL 단축(백엔드/웹 UI/Redis)
# ==================================================

services:
  shlink-backend:
    image: shlinkio/shlink:stable
    container_name: shlink-backend
    restart: unless-stopped
    ports:
      - 12005:8080
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      - MULTI_SEGMENT_SLUGS_ENABLED=true
      # 생성되는 단축 URL의 기본 도메인
      - DEFAULT_DOMAIN=${SHLINK_DOMAIN}
      # 단축 URL 생성 시 HTTPS 사용 여부
      - IS_HTTPS_ENABLED=true
      # 데이터베이스 드라이버 종류 (PostgreSQL)
      - DB_DRIVER=postgres
      # PostgreSQL 사용자 계정
      - DB_USER=${PG_SHLINK_USER}
      # PostgreSQL 사용자 비밀번호
      - DB_PASSWORD=${PG_SHLINK_USER_PASSWORD}
      # PostgreSQL 데이터베이스 이름
      - DB_NAME=${PG_SHLINK_DATABASE}
      # PostgreSQL 호스트명 (postgresql_default 네트워크 서비스명)
      - DB_HOST=postgresql
      # Redis 연결 주소 (캐시/락)
      - REDIS_SERVERS=tcp://shlink-redis:6379
      # GeoLite2 라이선스 키 (IP 위치 통계 기능)
      - GEOLITE_LICENSE_KEY=${GEOLITE_KEY}
    depends_on:
      - shlink-redis
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - $c=@fsockopen("127.0.0.1", 8080); if (!$c) { exit(1); } fclose($c);
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.25"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=shlink-backend
    networks:
      - shlink_default
      - npm_default
      - postgresql_default
  shlink-redis:
    image: redis:7-alpine
    container_name: shlink-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=shlink-redis
    networks:
      - shlink_default
  shlink-web:
    image: shlinkio/shlink-web-client:stable
    container_name: shlink-web
    restart: unless-stopped
    ports:
      - 12006:8080
    environment:
      # 컨테이너 내부 표준 시간대
      - TZ=Asia/Seoul
      # 웹 UI가 기본으로 연결할 Shlink 백엔드 URL
      - SHLINK_SERVER_URL=https://${SHLINK_DOMAIN}
      # 웹 UI에서 사용할 Shlink API 키
      - SHLINK_SERVER_API_KEY=${SHLINK_API_KEY}
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:8080
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=shlink-web
    networks:
      - npm_default
      - shlink_default
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  shlink_default:
    name: shlink_default
    driver: bridge
  npm_default:
    external: true
  postgresql_default:
    external: true
