# ==================================================
# CloudBeaver : 웹 기반 데이터베이스 관리 도구
# Avg CPU: 0.5 ~ 1%
# Avg Memory: 400MB
# ==================================================

services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: unless-stopped
    ports:
      - 12000:8978
    volumes:
      - ./data:/opt/cloudbeaver/workspace:rw
    environment:
      - TZ=Asia/Seoul
    networks:
      - postgresql_default
    # ==================================================
    # 헬스체크
    # ==================================================
    healthcheck:
      disable: false
      test: ["CMD", "curl", "-f", "http://localhost:8978/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 5s
    # ==================================================
    # 리소스 제한 - 필요시 조정
    # ==================================================
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    # ==================================================
    # 로그 설정
    # ==================================================
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        labels: service=cloudbeaver
# ==================================================
# 네트워크 설정
# ==================================================
networks:
  postgresql_default:
    external: true
